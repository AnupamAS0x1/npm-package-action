name: Deploy to npm

on:
  push:
    branches:
      - main

env:
  NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 12

    - name: Install dependencies
      run: npm ci

    - name: Publish to npm
      run: |
        echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > $HOME/.npmrc
        npm publish
